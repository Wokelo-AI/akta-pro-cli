name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds the wheel + sdist and attaches them to an auto-created GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          pkg=$(python -c "import sys; sys.path.insert(0, 'src'); import akta_cli; print(akta_cli.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          echo "package __version__=$pkg  tag=$tag"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag v$tag does not match __version__ ($pkg) — bump src/akta_cli/__init__.py"
            exit 1
          fi
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
